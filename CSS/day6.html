<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        img{
            border: 2px solid black;
            width: 50%;
            margin: 20px;
            
            border-top-left-radius: 20px;
            border-bottom-right-radius: 20px;
            width: 200px;
            height: 200px;

        }
        button{
            border: 1px solid black;
            width: 100px;
            background-color: purple;
            color: white;
            height: 40px;
            border-radius: 5px;
            
            
            
        }
        
        @media only screen and (max-width: 600px) {
            .card{
            width: 300px;
            height: 60%;
            border: 1px solid black;
            margin: auto;
            font-size: small;
            margin-top: 100px;
            border-radius: 20px; 
            text-align: center;  
            padding-bottom: 20px;
                     
        }
    }
        @media only screen and (min-width:601px){
            .card{
                background-color: lightblue;
                width:300px;
                height:60%;
                border: 1px solid black;
                margin:auto;
                font-size: large;
                margin-top: 100px;
                border-radius: 20px; 
                text-align: center; 
                padding-bottom: 20px;
            }
        }
        
        
    </style>
</head>
<body>
    <div class="card">
    <h1>product card</h1>
    
    <img src="https://cdn.thewirecutter.com/wp-content/media/2024/06/gaming-headset-2048px-1940.jpg?width=2048&quality=60&crop=2048:1365&auto=webp" alt="" height="100px" weight="50px">
   
    
    
    <h2 class="smal">wireless headphone</h2>
    <button>buy now</button>
    </div>
</body>
</html>
