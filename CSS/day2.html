<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outerbox {
            border: 16px solid rgb(151, 56, 56);
            width: 200px;
            height: 200px;
            background-color: yellow;
            padding: 30px 30px 30px 30px;
            margin: 20px 20px 20px 20px;
        }
        .middlebox {
            border: 8px solid rgb(42, 40, 179);
            width: 100px;
            height: 100px;
            background-color: lightblue;
            padding: 20px 20px 20px 20px;
            margin: 10px 10px 10px 10px;
        }
        .innerbox {
            border: 4px solid rgb(65, 14, 14);
            width: 50px;
            height: 50px;
            background-color: lightgreen;
            padding: 10px 10px 10px 10px;
            margin: 5px 5px 5px 5px;
        }
    </style>
</head>
<body>
    <div class="outerbox" >
        <div class="middlebox">
            <div class="innerbox">
                <p>box model.</p>
            </div>
        </div>   
    </div>

</body>
</html>
